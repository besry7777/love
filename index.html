<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 100vh;
      overflow: hidden;
    }

    .calculator {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      padding-bottom: 40px;
    }

    .display {
      font-size: 85px;
      font-weight: 300;
      text-align: right;
      padding: 20px 10px;
      word-break: break-all;
      transition: font-size 0.3s ease;
      min-height: 120px;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
    }

    /* คลาสสำหรับลดขนาดฟอนต์ตอนแสดงข้อความ */
    .display.message-mode {
      font-size: 45px;
      font-weight: 500;
      color: #ff2d55;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    button {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: none;
      border-radius: 50%;
      font-size: 32px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: filter 0.1s;
    }

    button:active {
      filter: brightness(1.5);
    }

    .btn-dark {
      background-color: #333333;
      color: #fff;
    }

    .btn-light {
      background-color: #a5a5a5;
      color: #000;
      font-size: 28px;
    }

    .btn-orange {
      background-color: #ff9f0a;
      color: #fff;
      font-size: 36px;
    }

    .btn-zero {
      grid-column: span 2;
      aspect-ratio: auto;
      border-radius: 50px;
      justify-content: flex-start;
      padding-left: 30px;
    }

    /* ปรับแต่งพิเศษสำหรับหน้าจอมือถือเล็กๆ */
    @media (max-width: 360px) {
      .display { font-size: 70px; }
      button { font-size: 28px; }
      .buttons { gap: 10px; }
    }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="display" id="display">0</div>
    <div class="buttons">
      <button class="btn-light" onclick="clearDisplay()">AC</button>
      <button class="btn-light" onclick="appendInput('+/-')">+/-</button>
      <button class="btn-light" onclick="appendInput('%')">%</button>
      <button class="btn-orange" onclick="appendInput('÷')">÷</button>

      <button class="btn-dark" onclick="appendInput('7')">7</button>
      <button class="btn-dark" onclick="appendInput('8')">8</button>
      <button class="btn-dark" onclick="appendInput('9')">9</button>
      <button class="btn-orange" onclick="appendInput('×')">×</button>

      <button class="btn-dark" onclick="appendInput('4')">4</button>
      <button class="btn-dark" onclick="appendInput('5')">5</button>
      <button class="btn-dark" onclick="appendInput('6')">6</button>
      <button class="btn-orange" onclick="appendInput('-')">−</button>

      <button class="btn-dark" onclick="appendInput('1')">1</button>
      <button class="btn-dark" onclick="appendInput('2')">2</button>
      <button class="btn-dark" onclick="appendInput('3')">3</button>
      <button class="btn-orange" onclick="appendInput('+')">+</button>

      <button class="btn-dark btn-zero" onclick="appendInput('0')">0</button>
      <button class="btn-dark" onclick="appendInput('.')">.</button>
      <button class="btn-orange" onclick="showLove()">=</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');
    let isMessageShown = false;

    function appendInput(val) {
      // ถ้ารูปหัวใจโชว์อยู่ แล้วกดปุ่มอื่น ให้รีเซ็ตกลับเป็นตัวเลขก่อน
      if (isMessageShown) {
        clearDisplay();
      }

      if (display.innerText === '0' && val !== '.') {
        display.innerText = val;
      } else {
        // จำกัดไม่ให้พิมพ์ยาวเกินไปจนล้นจอ
        if (display.innerText.length < 9) {
          display.innerText += val;
        }
      }
    }

    function clearDisplay() {
      display.innerText = '0';
      display.classList.remove('message-mode');
      isMessageShown = false;
    }

    function showLove() {
      // เซอร์ไพรส์! เมื่อกดปุ่ม = 
      display.innerText = 'I LOVE YOU 💖';
      display.classList.add('message-mode');
      isMessageShown = true;
    }
  </script>

</body>
</html>
