<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none; 
    }

    body {
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      height: 100dvh; 
      width: 100vw;
      overflow: hidden;
    }

    .calculator {
      width: 100%;
      max-width: min(400px, 75dvh); 
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
      padding-bottom: max(30px, env(safe-area-inset-bottom));
    }

    /* ซ่อนส่วนที่ล้นออกไปเพื่อให้ตอนสไลด์ดูเนียน ไม่ทะลุจอ */
    .display-container {
      width: 100%;
      overflow: hidden; 
      margin-bottom: 20px;
    }

    .display {
      font-size: 85px;
      font-weight: 300;
      text-align: right;
      padding: 0 10px;
      word-break: break-all;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
    }

    /* ตกแต่งข้อความ I LOVE YOU ให้สวยขึ้น */
    .display.message-mode {
      font-size: 42px;
      font-weight: 600;
      background: linear-gradient(135deg, #ff2a5f, #ff758c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      /* อนิเมชั่นเลื่อนจากขวามาซ้าย */
      animation: slideInText 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideInText {
      0% {
        transform: translateX(100%);
        opacity: 0;
      }
      100% {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: none;
      border-radius: 50%;
      font-size: 32px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: filter 0.1s;
    }

    button:active {
      filter: brightness(1.5);
    }

    .btn-dark {
      background-color: #333333;
      color: #fff;
    }

    .btn-light {
      background-color: #a5a5a5;
      color: #000;
      font-size: 28px;
      font-weight: 400;
    }

    .btn-orange {
      background-color: #ff9f0a;
      color: #fff;
      font-size: 36px;
    }

    .btn-zero {
      grid-column: span 2;
      aspect-ratio: auto;
      border-radius: 999px; 
      justify-content: flex-start;
      padding-left: 30px;
    }

    @media (max-width: 360px) {
      .display { font-size: 70px; }
      .display.message-mode { font-size: 34px; }
      button { font-size: 28px; }
      .buttons { gap: 10px; }
      .btn-zero { padding-left: 25px; }
    }
  </style>
</head>
<body>

  <div class="calculator">
  <img src="https://example.com/your-image.jpg" alt="Heart" style="width:100px; margin: 0 auto 20px; display:block;">

    <div class="display-container">
      <div class="display" id="display">0</div>
    </div>
    
    <div class="buttons">
      <button class="btn-light" onclick="clearDisplay()">AC</button>
      <button class="btn-light" onclick="appendInput('+/-')">+/-</button>
      <button class="btn-light" onclick="appendInput('%')">%</button>
      <button class="btn-orange" onclick="appendInput('÷')">÷</button>

      <button class="btn-dark" onclick="appendInput('7')">7</button>
      <button class="btn-dark" onclick="appendInput('8')">8</button>
      <button class="btn-dark" onclick="appendInput('9')">9</button>
      <button class="btn-orange" onclick="appendInput('×')">×</button>

      <button class="btn-dark" onclick="appendInput('4')">4</button>
      <button class="btn-dark" onclick="appendInput('5')">5</button>
      <button class="btn-dark" onclick="appendInput('6')">6</button>
      <button class="btn-orange" onclick="appendInput('-')">−</button>

      <button class="btn-dark" onclick="appendInput('1')">1</button>
      <button class="btn-dark" onclick="appendInput('2')">2</button>
      <button class="btn-dark" onclick="appendInput('3')">3</button>
      <button class="btn-orange" onclick="appendInput('+')">+</button>

      <button class="btn-dark btn-zero" onclick="appendInput('0')">0</button>
      <button class="btn-dark" onclick="appendInput('.')">.</button>
      <button class="btn-orange" onclick="showLove()">=</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');
    let isMessageShown = false;
    let isAnimating = false; // ตัวแปรสำหรับล็อคปุ่มตอนอนิเมชั่นเล่น

    function appendInput(val) {
      // ถ้ากำลังเล่นอนิเมชั่นอยู่ จะกดปุ่มอะไรไม่ได้เลย
      if (isAnimating) return; 

      if (isMessageShown) {
        clearDisplay();
      }

      if (display.innerText === '0' && val !== '.') {
        display.innerText = val;
      } else {
        if (display.innerText.length < 9) {
          display.innerText += val;
        }
      }
    }

    function clearDisplay() {
      if (isAnimating) return; // กันบัคกด AC ตอนกำลังเล่นอนิเมชั่น
      
      display.innerText = '0';
      display.classList.remove('message-mode');
      isMessageShown = false;
    }

    function showLove() {
      // ถ้าโชว์ข้อความไปแล้ว หรือกำลังเล่นอนิเมชั่นอยู่ ให้หยุดการทำงาน (ป้องกันการกด = รัวๆ)
      if (isMessageShown || isAnimating) return;

      isAnimating = true;
      isMessageShown = true;

      // รีเซ็ตคลาสก่อนเพื่อชัวร์ว่าอนิเมชั่นจะทำงาน
      display.classList.remove('message-mode');
      
      // บังคับให้เบราว์เซอร์อัปเดต DOM (เคลียร์เฟรม) เพื่อให้อนิเมชั่นทำงานใหม่ได้สมบูรณ์
      void display.offsetWidth; 
      
      display.innerText = 'I LOVE YOU 💖';
      display.classList.add('message-mode');

      // ปลดล็อคปุ่มหลังจากผ่านไป 1.5 วินาที (เท่ากับความยาวอนิเมชั่นใน CSS)
      setTimeout(() => {
        isAnimating = false;
      }, 1500);
    }
  </script>

</body>
</html>
