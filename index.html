<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GIT!!! HEART</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at center, #2b0012, #070007 70%);
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.1);
    }

    .box {
      width: min(90vw, 520px);
      padding: 28px;
      border: 1px solid rgba(255, 90, 140, 0.45);
      border-radius: 24px;
      background: rgba(20, 0, 10, 0.65);
      box-shadow: 0 0 35px rgba(255, 0, 80, 0.35);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 8vw, 58px);
      color: #ff4d88;
      text-shadow: 0 0 18px #ff0055;
    }

    p {
      color: #ffd6e5;
      line-height: 1.6;
      font-size: 18px;
    }

    button {
      margin-top: 18px;
      border: none;
      padding: 15px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff0055, #ff77aa);
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 22px rgba(255, 0, 90, 0.7);
      transition: transform 0.15s ease;
    }

    button:active {
      transform: scale(0.95);
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .message {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      width: min(92vw, 680px);
      padding: 16px 20px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 120, 170, 0.4);
      color: #ffe4ef;
      text-align: center;
      font-size: clamp(16px, 4vw, 22px);
      box-shadow: 0 0 22px rgba(255, 0, 90, 0.25);
      backdrop-filter: blur(6px);
      animation: floatText 2.2s ease-in-out infinite;
    }

    @keyframes floatText {
      0%, 100% {
        transform: translateX(-50%) translateY(0);
      }
      50% {
        transform: translateX(-50%) translateY(-8px);
      }
    }

    .small {
      font-size: 14px;
      color: #ffb6cf;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <canvas id="heartCanvas"></canvas>

  <div class="screen" id="startScreen">
    <div class="box">
      <h1>GIT!!!</h1>
      <p>
        ระบบกำลังโหลดหัวใจ...<br>
        กดปุ่มแล้วรอดูว่ามันจะเกิดอะไรขึ้น
      </p>
      <button onclick="startHeart()">เปิดหัวใจ</button>
      <p class="small">HTML ไฟล์เดียว เปิดได้ทันที</p>
    </div>
  </div>

  <div class="message hidden" id="message">
    I LOVE YOU 💗<br>
    <span class="small">แก้ข้อความนี้เป็นชื่อคนที่อยากให้ได้เลย</span>
  </div>

  <script>
    const canvas = document.getElementById("heartCanvas");
    const ctx = canvas.getContext("2d");
    const startScreen = document.getElementById("startScreen");
    const message = document.getElementById("message");

    let W, H;
    let particles = [];
    let started = false;
    let time = 0;

    const heartText = "LOVE";

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resize);
    resize();

    function heartPoint(t, scale) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y =
        13 * Math.cos(t) -
        5 * Math.cos(2 * t) -
        2 * Math.cos(3 * t) -
        Math.cos(4 * t);

      return {
        x: W / 2 + x * scale,
        y: H / 2 - y * scale
      };
    }

    function createParticles() {
      particles = [];

      const scale = Math.min(W, H) / 34;

      for (let i = 0; i < 900; i++) {
        const t = Math.random() * Math.PI * 2;
        const p = heartPoint(t, scale);

        const randomSize = Math.random() * 1.5 + 0.6;

        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          tx: p.x + (Math.random() - 0.5) * 22,
          ty: p.y + (Math.random() - 0.5) * 22,
          size: randomSize,
          speed: Math.random() * 0.025 + 0.015,
          angle: Math.random() * Math.PI * 2,
          text: heartText
        });
      }
    }

    function startHeart() {
      started = true;
      startScreen.classList.add("hidden");
      message.classList.remove("hidden");
      createParticles();
    }

    function drawBackground() {
      const gradient = ctx.createRadialGradient(
        W / 2,
        H / 2,
        0,
        W / 2,
        H / 2,
        Math.max(W, H)
      );

      gradient.addColorStop(0, "#350014");
      gradient.addColorStop(0.45, "#130009");
      gradient.addColorStop(1, "#030003");

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);
    }

    function drawParticles() {
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      for (const p of particles) {
        p.x += (p.tx - p.x) * p.speed;
        p.y += (p.ty - p.y) * p.speed;

        p.angle += 0.03;

        const waveX = Math.sin(time + p.angle) * 2.5;
        const waveY = Math.cos(time + p.angle) * 2.5;

        ctx.font = `${10 + p.size * 5}px Arial`;
        ctx.fillStyle = `rgba(255, ${80 + Math.random() * 80}, ${140 + Math.random() * 80}, 0.9)`;
        ctx.shadowBlur = 14;
        ctx.shadowColor = "#ff0055";
        ctx.fillText(p.text, p.x + waveX, p.y + waveY);
      }

      ctx.shadowBlur = 0;
    }

    function drawWaitingEffect() {
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "bold 22px Arial";
      ctx.fillStyle = "rgba(255, 180, 210, 0.5)";
      ctx.fillText("กดปุ่มเพื่อเริ่ม", W / 2, H / 2 + 170);
    }

    function animate() {
      time += 0.025;
      drawBackground();

      if (started) {
        drawParticles();
      } else {
        drawWaitingEffect();
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
